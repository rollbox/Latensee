name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swiftc main.swift -O -o latensee

      - name: Verify binary
        run: file latensee

      - name: Build app bundle
        run: ./build.sh

      - name: Verify app bundle
        run: |
          test -x Latensee.app/Contents/MacOS/Latensee
          test -f Latensee.app/Contents/Info.plist
          file Latensee.app/Contents/MacOS/Latensee
